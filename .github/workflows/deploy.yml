name: Deploy to Production

on:
  push:
    branches: [master]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM:  ${{ secrets.TURBO_TEAM }}

jobs:
  # ── 1. Run DB migrations FIRST (before any new code is live) ───────────────
  migrate:
    name: DB Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run Prisma migrations
        run: pnpm --filter=@aihq/api db:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── 2. Deploy API to Railway (after migrations succeed) ────────────────────
  deploy-api:
    name: Deploy API → Railway
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: migrate
    outputs:
      deployed: ${{ steps.deploy.outputs.deployed }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm turbo build --filter=@aihq/api

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API to Railway
        id: deploy
        run: |
          railway up --service api --detach
          echo "deployed=true" >> "$GITHUB_OUTPUT"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── 3. Verify API health after deploy ──────────────────────────────────────
  verify-api:
    name: Verify API Health
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: deploy-api
    steps:
      - name: Poll /health until ready (max 2 min)
        run: |
          for i in $(seq 1 24); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ secrets.API_URL }}/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "API is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "API did not become healthy in time"
          exit 1

      - name: Check readiness endpoint
        run: |
          BODY=$(curl -sf "${{ secrets.API_URL }}/ready")
          echo "Readiness response: $BODY"
          echo "$BODY" | grep -q '"status":"ready"' || (echo "API not ready" && exit 1)

  # ── 4. Deploy Web to Vercel (parallel with API verify) ─────────────────────
  deploy-web:
    name: Deploy Web → Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: migrate
    outputs:
      preview-url: ${{ steps.deploy.outputs.preview-url }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy to Vercel (production)
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args:       "--prod"
          working-directory: apps/web

  # ── 5. E2E tests against production ────────────────────────────────────────
  e2e:
    name: E2E Tests (Chromium)
    runs-on: ubuntu-latest
    needs: [deploy-web, verify-api]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          BASE_URL:                 ${{ secrets.PRODUCTION_URL }}
          E2E_CLERK_SESSION_TOKEN:  ${{ secrets.E2E_CLERK_SESSION_TOKEN }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name:           playwright-report
          path:           playwright-report/
          retention-days: 7

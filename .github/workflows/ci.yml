name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM:  ${{ secrets.TURBO_TEAM }}
  NODE_ENV:    test

jobs:
  # ── 1. Security audit ───────────────────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Audit dependencies for known vulnerabilities
        # --audit-level=high: only fail on high/critical CVEs
        run: pnpm audit --audit-level=high

  # ── 2. Lint, type-check, unit tests ────────────────────────────────────────
  quality:
    name: Lint · Type-check · Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

      - name: Type-check
        run: pnpm turbo type-check

      - name: Unit & component tests
        run: pnpm turbo test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aihq_test

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── 3. Build (with Turborepo remote cache) ──────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm turbo build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_API_URL:               http://localhost:3001
          NEXT_PUBLIC_APP_URL:               http://localhost:3000

      # Upload Next.js build stats for bundle-size tracking
      - name: Upload Next.js build stats
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-stats
          path: apps/web/.next/analyze/
          retention-days: 30

  # ── 4. Bundle-size check ────────────────────────────────────────────────────
  bundle-size:
    name: Bundle Size
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    # Only run on PRs so we can compare against base
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build with analyzer
        run: pnpm --filter=@aihq/web build
        env:
          ANALYZE:                           true
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_API_URL:               http://localhost:3001

      - name: Comment bundle sizes on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const statsPath = 'apps/web/.next/analyze/client.html';
            if (fs.existsSync(statsPath)) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '📦 Bundle analysis generated — download the `nextjs-build-stats` artifact to inspect.',
              });
            }
